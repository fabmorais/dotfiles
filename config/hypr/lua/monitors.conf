# Monitor layout and workspace pinning — sourced from hyprland.conf.
monitor=eDP-1,2560x1600@120,0x0,1.25            # laptop (left) eGPU
monitor=eDP-2,2560x1600@120,0x0,1.25            # laptop (left) iGPU
monitor=DP-3,3440x1440@165,2048x0,1             # external ultrawide (right)
monitor=HDMI-A-1,1920x1080@60,960x-1080,1       # projector above laptop

# Workspace → monitor pinning
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:eDP-1, default:true
workspace = 6, monitor:eDP-1, default:true
