# Input devices and bind behavior — sourced from hyprland.conf.
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = grp:win_space_toggle, compose:ralt
    repeat_rate = 50
    repeat_delay = 240
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        disable_while_typing = true
    }
}

binds {
    workspace_back_and_forth     = true
    allow_workspace_cycles       = true
    movefocus_cycles_fullscreen  = true     # focus stays inside fullscreen window
    pass_mouse_when_bound        = false
}
