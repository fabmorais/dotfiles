# Autostart — sourced from hyprland.conf.

# Unlock kwallet from pam credentials (must run before any KDE app touches kwalletd6)
exec-once = /usr/lib/pam_kwallet_init
exec-once = caelestia shell -d      # Caelestia shell
exec-once = sway-audio-idle-inhibit
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent      # polkit GUI prompts (timeshift, etc.)

# Pinned apps per workspace
exec-once = [workspace 1 silent] firefox
exec-once = [workspace 2 silent] alacritty
exec-once = [workspace 3 silent] brave
exec-once = [workspace special silent] /usr/bin/obsidian

# Watch caelestia scheme changes → sync to all apps (alacritty, starship, ...)
exec-once = $HOME/.local/bin/caelestia-scheme-watcher

# Fn+F2/F3 are swallowed by asusd at the EC, so a key bind never fires.
# Watch asusd's D-Bus PropertiesChanged signal instead and emit OSD notifs.
exec-once = $HOME/.local/bin/kb-bright-watcher

# Clipboard watcher (cliphist)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
