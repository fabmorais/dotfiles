# Keybinds — sourced from hyprland.conf.
# Requires $mod defined upstream (declared at top of hyprland.conf).

# ─── Window / Session actions ──────────────────────────────────────────
bind = $mod, Q,       killactive
bind = $mod SHIFT, Q, exec, kill -9 $(hyprctl activewindow | grep pid | tail -1 | awk '{print $2}')
bind = $mod, V,       togglefloating
bind = $mod, F,       fullscreen, 1
bind = $mod SHIFT, F, fullscreen
bind = $mod, Delete,  exit
bind = CTRL ALT, Q,   global, caelestia:lock
bind = $mod, Backspace, global, caelestia:session
bind = $mod, D,       pseudo
bind = $mod, R,       layoutmsg, togglesplit

# ─── Launch terminals ──────────────────────────────────────────────────
bind = $mod, Return,       exec, alacritty
bind = $mod SHIFT, Return, exec, kitty
bind = $mod, T,            exec, $HOME/.local/bin/ghostty-toggle

# ─── App shortcuts ─────────────────────────────────────────────────────
bind = $mod, M,       exec, [workspace 1] thunderbird
bind = $mod, B,       exec, [workspace 1] firefox
bind = $mod SHIFT, B, exec, [workspace 3] brave -password-store=basic
bind = $mod, O,       exec, /usr/bin/obsidian
bind = $mod, Y,       exec, [workspace 4 silent] io.freetubeapp.FreeTube
bind = $mod SHIFT, M, exec, [workspace 5 silent] com.mastermindzh.tidal-hifi
bind = $mod, E,       exec, $HOME/.local/bin/caelestia-explorer            # explorer from caelestia shell.json
bind = $mod, A,       exec, qs -c caelestia ipc call drawers toggle dashboard  # overview/dashboard
bind = $mod, N,       exec, sh -c 'if pgrep -x hyprsunset >/dev/null; then pkill hyprsunset && notify-send -u low "Night mode OFF"; else hyprsunset -t 4500 & notify-send -u low "Night mode ON (4500K)"; fi'
bind = $mod, W,       exec, qs -c caelestia ipc call drawers toggle sidebar    # quick toggles sidebar
bind = $mod SHIFT, A, exec, qs -c caelestia ipc call drawers toggle bar        # hide/show bar
bind = $mod, SPACE,   exec, 1password --quick-access
bind = $mod, Super_L, exec, caelestia shell drawers toggle launcher
bind = $mod, Z,       exec, $HOME/.local/bin/pin-toggle                    # pin window always-on-top
bind = $mod, X,       exec, sh -c 'qs -c caelestia ipc call idleInhibitor toggle; if [ "$(qs -c caelestia ipc call idleInhibitor isEnabled)" = "true" ]; then notify-send -u low -i system-lock-screen "Idle inhibitor ON"; else notify-send -u low -i system-lock-screen "Idle inhibitor OFF"; fi'
bind = $mod, U,       exec, caelestia wallpaper -r                         # random wallpaper
bind = $mod, I,       exec, $HOME/.local/bin/caelestia-controlcenter-toggle  # control center toggle
bind = $mod, slash,   exec, $HOME/.local/bin/binds-help                    # binds cheatsheet
bind = $mod SHIFT, G, exec, $HOME/.local/bin/gamelauncher                  # Steam game launcher (rofi)

# ─── Clipboard ─────────────────────────────────────────────────────────
bind = $mod, C, exec, pgrep -x fuzzel >/dev/null && pkill fuzzel || caelestia clipboard

# ─── Focus (arrows + vim hjkl) ─────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ─── Move window (vim hjkl) ────────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ─── Resize active (vim hjkl, repeat enabled) ──────────────────────────
binde = $mod CTRL, L, resizeactive,  30 0
binde = $mod CTRL, H, resizeactive, -30 0
binde = $mod CTRL, K, resizeactive,  0 -30
binde = $mod CTRL, J, resizeactive,  0 30

# ─── Mouse drag move/resize ────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Workspaces (1-5) ──────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move active window to relative workspace
bind = $mod CTRL ALT, L, movetoworkspace, r+1
bind = $mod CTRL ALT, H, movetoworkspace, r-1

# ─── Workspace navigation (scroll + previous) ──────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, period,     workspace, e+1
bind = $mod, comma,      workspace, e-1
bind = $mod, TAB,        workspace, previous

# ─── Scratchpad (special workspace) ────────────────────────────────────
bind = $mod, S,       togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace,       special
bind = $mod ALT,   S, movetoworkspacesilent, special

# ─── App switcher (alt-tab cycle) ──────────────────────────────────────
# cycle.sh preserves fullscreen across windows
bindp = ALT, TAB,   exec, ~/.config/hypr/scripts/cycle.sh next
bindp = ALT, grave, exec, ~/.config/hypr/scripts/cycle.sh prev

# ─── Window groups (tabbed group) ──────────────────────────────────────
bind = $mod, G,                    togglegroup
bind = CTRL, comma,                changegroupactive, b
bind = CTRL, period,               changegroupactive, f
bind = $mod SHIFT, mouse_up,       changegroupactive, b
bind = $mod SHIFT, mouse_down,     changegroupactive, f
bind = $mod ALT, L,                lockgroups,    toggle
bind = $mod ALT, H,                moveoutofgroup, l
bind = $mod ALT, J,                moveintogroup,  l
bind = $mod ALT, K,                moveintogroup,  r

# ─── Move workspace between monitors ───────────────────────────────────
bind = $mod ALT, Z,                swapactiveworkspaces, DP-3 eDP-1
bind = $mod ALT, Z,                swapactiveworkspaces, DP-3 eDP-2
bind = $mod ALT SHIFT, Z,          exec, hyprctl dispatch movecurrentworkspacetomonitor DP-3
bind = ALT CTRL, H,                movecurrentworkspacetomonitor, l
bind = ALT CTRL, L,                movecurrentworkspacetomonitor, r
bind = ALT CTRL, K,                movecurrentworkspacetomonitor, u
bind = ALT CTRL, J,                movecurrentworkspacetomonitor, d

# ─── Android dev (scrcpy mirror) ───────────────────────────────────────
bind = $mod ALT, N, exec, mirror

# ─── Custom scripts  ─────────────────────────────
bind = $mod ALT, M, exec, ~/.config/waybar/scripts/asus_gpu_menu.sh     # ASUS GPU mode menu
bind = $mod ALT, V, exec, ~/.config/hypr/scripts/toggle_vpn.sh   # toggle OpenVPN
bind = $mod ALT, G, exec, qs -c caelestia ipc call gameMode toggle       # toggle caelestia game mode

# ─── Keyboard backlight (laptop FN+F2/F3) ──────────────────────────────
# No keybind needed — asusd handles Fn+F2/F3 in the EC and the keysym never
# reaches Wayland. The OSD notification is fired by kb-bright-watcher (see
# exec-once above) when asusd raises PropertiesChanged on the aura D-Bus path.

# ─── Display backlight (laptop FN+F7/F8) ───────────────────────────────
binde = , XF86MonBrightnessUp,   exec, $HOME/.local/bin/brightness-adjust up
binde = , XF86MonBrightnessDown, exec, $HOME/.local/bin/brightness-adjust down

# ─── Hardware events (lid + monitor hotplug) ───────────────────────────
bindl = , switch:on:Lid Switch, exec, systemctl suspend
bindl = , switch:on:DP-3,       exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:DP-3,      exec, hyprctl keyword monitor "eDP-1, 2560x1600@120, 0x0, 1.25"

# ─── Screen capture ────────────────────────────────────────────────────
bindl = , Print,             exec, caelestia screenshot                  # full screen → clipboard
bind  = $mod, P,             exec, caelestia screenshot --region         # region → clipboard
bind  = $mod CTRL, P,        exec, hyprpicker -an                        # color picker → clipboard
bind  = $mod SHIFT, P,       exec, caelestia screenshot                  # full screen → clipboard (same as Print)

# ─── Multimedia (FN+F1/F2/F3) ──────────────────────────────────────────
bind = , XF86Explorer, exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86Mail,     exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86Search,   exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

# ─── ASUS M1/M2/M3 (volume up, volume down, mic mute) ──────────────────
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Media play/pause/next/prev (if keyboard has them)
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl previous

# ─── ASUS hardware (M1-M4 / FN ROG keys) ───────────────────────────────
# Mapping may vary by model. Run `wev | grep -i xf86` to identify which M is which.
bind = , XF86Launch1, exec, rog-control-center
bind = , XF86Launch2, exec, asusctl profile -n; notify-send -u low "ASUS profile changed"
bind = , XF86Launch3, exec, asusctl aura effect --next-mode; notify-send -u low "Rog Aura changed"
bind = , XF86Launch4, exec, asusctl profile -n; notify-send -u low "ASUS profile changed"
