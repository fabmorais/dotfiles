# Environment variables — sourced from hyprland.conf.
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = ZDOTDIR,$HOME

# Toolkit backends (Wayland-first, X11 fallback)
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland,x11,windows
env = CLUTTER_BACKEND,wayland

# Qt behavior
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qtengine              # Qt apps follow caelestia scheme via qtengine

# Firefox Wayland
env = MOZ_ENABLE_WAYLAND,1

# Java apps fix (IntelliJ, etc.)
env = _JAVA_AWT_WM_NONREPARENTING,1
