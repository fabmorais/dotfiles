# Window rules — sourced from hyprland.conf.

# ─── Workspace pinning ─────────────────────────────────────────────────
windowrule = workspace 4, match:class ^(steam.*)$

# ─── Opacity per app ───────────────────────────────────────────────────
windowrule = opacity 0.8 0.8,   match:class ^(com.mitchellh.ghostty)$
windowrule = opacity 0.8 0.8,   match:class ^(Alacritty)$
windowrule = opacity 0.92 0.92, match:class ^(brave-browser)$
windowrule = opacity 0.92 0.92, match:class ^(firefox)$
windowrule = opacity 0.99 0.99, match:class ^(FreeTube)$
windowrule = opacity 0.90 0.90, match:class ^(io.freetubeapp.FreeTube)$
windowrule = opacity 0.90 0.90, match:class ^(vesktop)$
windowrule = opacity 0.90 0.90, match:class ^(thunderbird)$
windowrule = opacity 0.90 0.90, match:class ^(Notesnook)$
windowrule = opacity 0.90 0.70, match:class ^(ch.proton.bridge-gui)$
windowrule = opacity 0.90 0.70, match:class ^(com.mastermindzh.tidal-hifi)$
windowrule = opacity 0.70 0.70, match:initial_class ^(com.mastermindzh.tidal-hifi)$
windowrule = opacity 0.90 0.70, match:class ^(feishin)$
windowrule = opacity 0.70 0.70, match:initial_title ^(Heroic Games Launcher)$
windowrule = opacity 0.80 0.80, match:class ^(VSCodium)$
windowrule = opacity 0.80 0.80, match:class ^(codium-url-handler)$
windowrule = opacity 0.80 0.80, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.80 0.80, match:class ^(com.saivert.pwvucontrol)$

# ─── Alacritty: update-sys animation ───────────────────────────────────
windowrule {
    name = alacritty-update-sys-animation
    match:class = ^(Alacritty)$
    match:title = ^(update-sys)$
    animation = popin
}

# ─── scrcpy — Android phone mirror ─────────────────────────────────────
windowrule = float on,            match:class ^(scrcpy)$
windowrule = size 550 1223,       match:class ^(scrcpy)$
windowrule = move 100%-570 76,    match:class ^(scrcpy)$
windowrule = pin on,              match:class ^(scrcpy)$

# ─── Float small utility windows ───────────────────────────────────────
windowrule {
    name = calculator-float
    match:initial_title = ^(Calculator)$
    float  = on
    size   = 100 100
    center = on
}

windowrule {
    name = clocks-float
    match:initial_title = ^(Clocks)$
    float  = on
    size   = 800 600
    center = on
}

windowrule {
    name = mousam-float
    match:class = ^(io.github.amit9838.mousam)$
    float  = on
    size   = 1000 800
    center = on
}

windowrule {
    name = gnome-calendar-float
    match:class = ^(org.gnome.Calendar)$
    float = on
    size  = 1200 1000
}

windowrule = float on, match:class ^(io.elementary.calendar)$
windowrule = float on, match:class ^(timeshift-gtk)$

windowrule {
    name = dolphin-float
    match:class = ^(org.kde.dolphin)$
    float = on
    size  = 1200 1000
}

windowrule {
    name = pavucontrol-float
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = on
    size  = 1200 1000
}

windowrule {
    name = pwvucontrol-float
    match:class = ^(com.saivert.pwvucontrol)$
    float = on
    size  = 1200 1000
}

windowrule = float on, match:initial_title ^(Friends List)$
windowrule = float on, match:title ^(Friends List)$

windowrule {
    name = ente-auth-float
    match:class = ^(io.ente.auth)$
    float = on
    size  = 800 600
}

# Picture-in-Picture (FreeTube, Firefox, Brave, Chromium) — float, pin, bottom-right
windowrule = float on,                  match:title ^(Picture in picture|Picture-in-Picture)$
windowrule = pin on,                    match:title ^(Picture in picture|Picture-in-Picture)$
windowrule = size 720 405,              match:title ^(Picture in picture|Picture-in-Picture)$
windowrule = move 100%-w-30 100%-h-50,  match:title ^(Picture in picture|Picture-in-Picture)$

# Polkit auth prompts — float, pin so they don't migrate to other workspaces
windowrule = float on, match:class ^(.*polkit.*authentication-agent.*|hyprpolkitagent)$
windowrule = pin on,   match:class ^(.*polkit.*authentication-agent.*|hyprpolkitagent)$
windowrule = float on, match:title ^(Authentication Required)$
windowrule = pin on,   match:title ^(Authentication Required)$
