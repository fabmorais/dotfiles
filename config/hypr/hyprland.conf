# Vanilla Hyprland config (hyprlang format).
# Targeting Hyprland 0.54.x; will migrate to hyprland.lua when 0.55+ ships.

# ─── HyDE-compat aliases (lets userprefs.conf from HyDE still parse) ───
$mainMod = SUPER
$CONTROL = CTRL
$scrPath = $HOME/.config/hypr/custom_scripts
$browser = firefox
$d =

# ─── Monitor ────────────────────────────────────────────────────────────
monitor=,preferred,auto,1

# ─── Autostart ──────────────────────────────────────────────────────────
exec-once = qs -c noctalia-shell    # Noctalia shell
exec-once = kitty             # terminal on first launch

# ─── Input ──────────────────────────────────────────────────────────────
input {
    kb_layout = br
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ─── General ────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# ─── Decoration ─────────────────────────────────────────────────────────
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
    }
}

# ─── Animations ─────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 5, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 5, ease
}

# ─── Layout ─────────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ─── Keybinds ───────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Q, exec, kitty
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

# focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── User overrides (per-machine, gitignored) ───────────────────────────
source = userprefs.conf
