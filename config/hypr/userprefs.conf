# Vanilla user preferences — cleaned from HyDE-specific deps.
# Sourced from hyprland.conf. Lines referencing custom_scripts/ are
# kept but commented — uncomment when you migrate the scripts.

# ─── Autostart ─────────────────────────────────────────────────────────
exec-once = solaar -w hide
exec-once = ch.protonmail.protonmail-bridge --no-window
exec-once = filen-desktop --hidden
exec-once = sway-audio-idle-inhibit
exec-once = pkill kded6 || true

exec-once = [workspace 1 silent] firefox
exec-once = [workspace 2 silent] alacritty
exec-once = [workspace 3 silent] brave
exec-once = [workspace special silent] md.obsidian.Obsidian

# Theme sync scripts (custom_scripts/) — uncomment after migrating from HyDE
# exec = ~/.config/hypr/custom_scripts/change_theme_alacritty.sh
# exec = ~/.config/hypr/custom_scripts/change_theme_starship.sh
# exec = ~/.config/hypr/custom_scripts/change_theme_nvim.sh
# exec = ~/.config/hypr/custom_scripts/change_theme_tmux.sh
# exec = ~/.config/hypr/custom_scripts/change_kb_mouse_color.sh
# exec = sudo systemctl restart powertop.service

# ─── Env ───────────────────────────────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = ZDOTDIR,$HOME

# ─── Input ─────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = grp:win_space_toggle, compose:ralt
    repeat_rate = 50
    repeat_delay = 240
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        disable_while_typing = true
    }
}

# ─── Layout ────────────────────────────────────────────────────────────
general {
    layout = dwindle
}

dwindle {
    force_split = 2
    preserve_split = true
}

# Scrolling layout (requires Hyprland 0.55+ or plugin)
# scrolling {
#     column_width = 0.5
#     fullscreen_on_one_column = true
#     follow_focus = true
#     direction = right
# }
# workspace = 3, layout:scrolling

misc:allow_session_lock_restore = 1
misc:on_focus_under_fullscreen = 1

binds {
    workspace_back_and_forth = 1
    allow_workspace_cycles = 1
    pass_mouse_when_bound = 0
    movefocus_cycles_fullscreen = 1
}

xwayland {
    force_zero_scaling = true
}

# ─── Window rules ──────────────────────────────────────────────────────
windowrule = workspace 4, match:class ^(steam.*)$

# Opacity per app
windowrule = opacity 0.8 0.8,   match:class ^(com.mitchellh.ghostty)$
windowrule = opacity 0.8 0.8,   match:class ^(Alacritty)$
windowrule = opacity 0.99 0.99, match:class ^(brave-browser)$
windowrule = opacity 0.99 0.99, match:class ^(FreeTube)$
windowrule = opacity 0.90 0.90, match:class ^(io.freetubeapp.FreeTube)$
windowrule = opacity 0.90 0.90, match:class ^(vesktop)$
windowrule = opacity 0.90 0.90, match:class ^(thunderbird)$
windowrule = opacity 0.90 0.90, match:class ^(Notesnook)$
windowrule = opacity 0.90 0.70, match:class ^(ch.proton.bridge-gui)$
windowrule = opacity 0.90 0.70, match:class ^(com.mastermindzh.tidal-hifi)$
windowrule = opacity 0.70 0.70, match:initial_class ^(com.mastermindzh.tidal-hifi)$
windowrule = opacity 0.90 0.70, match:class ^(feishin)$
windowrule = opacity 0.70 0.70, match:initial_title ^(Heroic Games Launcher)$
windowrule = opacity 0.80 0.80, match:class ^(VSCodium)$
windowrule = opacity 0.80 0.80, match:class ^(codium-url-handler)$
windowrule = opacity 0.80 0.80, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.80 0.80, match:class ^(com.saivert.pwvucontrol)$

windowrule {
    name = alacritty-update-sys-animation
    match:class = ^(Alacritty)$
    match:title = ^(update-sys)$
    animation = popin
}

# scrcpy — Android phone mirror
windowrule = float on, match:class ^(scrcpy)$
windowrule = size 550 1223, match:class ^(scrcpy)$
windowrule = move 100%-570 76, match:class ^(scrcpy)$
windowrule = pin on, match:class ^(scrcpy)$

# Float small utility windows
windowrule {
    name = calculator-float
    match:initial_title = ^(Calculator)$
    float = on
    size = 100 100
    center = on
}

windowrule {
    name = clocks-float
    match:initial_title = ^(Clocks)$
    float = on
    size = 800 600
    center = on
}

windowrule {
    name = mousam-float
    match:class = ^(io.github.amit9838.mousam)$
    float = on
    size = 1000 800
    center = on
}

windowrule {
    name = gnome-calendar-float
    match:class = ^(org.gnome.Calendar)$
    float = on
    size = 1200 1000
}

windowrule = float on, match:class ^(io.elementary.calendar)$
windowrule = float on, match:class ^(timeshift-gtk)$

windowrule {
    name = dolphin-float
    match:class = ^(org.kde.dolphin)$
    float = on
    size = 1200 1000
}

windowrule {
    name = pavucontrol-float
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = on
    size = 1200 1000
}

windowrule {
    name = pwvucontrol-float
    match:class = ^(com.saivert.pwvucontrol)$
    float = on
    size = 1200 1000
}

windowrule = float on, match:initial_title ^(Friends List)$
windowrule = float on, match:title ^(Friends List)$

windowrule {
    name = ente-auth-float
    match:class = ^(io.ente.auth)$
    float = on
    size = 800 600
}

# ─── Keybinds: window/session actions ──────────────────────────────────
bind = $mainMod SHIFT, Q, exec, kill -9 $(hyprctl activewindow | grep pid | tail -1 | awk '{print $2}')
bind = $mainMod, D, pseudo
bind = $mainMod, R, layoutmsg, togglesplit
bind = $mainMod SHIFT, F, fullscreen

# HyDE-only — uncomment if scripts present:
# bindd = CTRL ALT, Q, $d lock screen, exec, lockscreen.sh
# bind = $CONTROL, ESCAPE, exec, killall waybar || waybar
# bind = Ctrl+Alt, W, exec, $scrPath/windowpin.sh
# bindd = $mainMod, backspace, $d logout menu, exec, $scrPath/logoutlaunch.sh

# ─── Keybinds: app shortcuts ───────────────────────────────────────────
bind = $mainMod, M, exec, [workspace 1] thunderbird
bind = $mainMod, B, exec, [workspace 1] firefox
bind = $mainMod, return, exec, [workspace 2] alacritty
bind = $mainMod SHIFT, B, exec, [workspace 3] brave -password-store=basic
bind = $mainMod, O, exec, md.obsidian.Obsidian
bind = $mainMod, Y, exec, [workspace 4 silent] io.freetubeapp.FreeTube
bind = $mainMod SHIFT, M, exec, [workspace 5 silent] com.mastermindzh.tidal-hifi
bind = $mainMod SHIFT, return, exec, ghostty
bind = $mainMod, SPACE, exec, 1password --quick-access

# Launchers/clipboard/emoji — depend on rofi + scripts (HyDE)
# bindr = SUPER, SUPER_L, exec, pkill -x rofi || $rofi-launch d
# bindd = $mainMod ALT, comma,  $d emoji  picker, exec, pkill -x rofi || $scrPath/emoji-picker.sh
# bindd = $mainMod ALT, period, $d glyph picker, exec, pkill -x rofi || $scrPath/glyph-picker.sh
# bindd = $mainMod, C,       $d clipboard,         exec, pkill -x rofi || $scrPath/cliphist.sh -c
# bindd = $mainMod Shift, C, $d clipboard manager, exec, pkill -x rofi || $scrPath/cliphist.sh

# Game launcher / wallbash toggle (HyDE)
# bind = $mainMod Shift, G, exec, $scrPath/gamelauncher.sh 4
# bind = $mainMod Shift, D, exec, pkill -x rofi || $scrPath/wallbashtoggle.sh

# ─── Keybinds: focus/move/resize (vim style) ───────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

binde = $mainMod CTRL, l, resizeactive, 30 0
binde = $mainMod CTRL, h, resizeactive, -30 0
binde = $mainMod CTRL, k, resizeactive, 0 -30
binde = $mainMod CTRL, j, resizeactive, 0 30

# Scroll workspaces
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Move active window to relative workspace
bind = $mainMod+Ctrl+Alt, l, movetoworkspace, r+1
bind = $mainMod+Ctrl+Alt, h, movetoworkspace, r-1

# ─── Keybinds: alt-tab cycle (custom script — HyDE) ────────────────────
# bind = ALT, TAB,   exec, ~/.config/hypr/scripts/cycle.sh next
# bind = ALT, grave, exec, ~/.config/hypr/scripts/cycle.sh prev

# ─── Keybinds: groups ──────────────────────────────────────────────────
bind = CTRL, comma,  changegroupactive, b
bind = CTRL, period, changegroupactive, f
bind = $mainMod SHIFT, mouse_up,   changegroupactive, b
bind = $mainMod SHIFT, mouse_down, changegroupactive, f
bind = $mainMod ALT, L, lockgroups,    toggle
bind = $mainMod ALT, H, moveoutofgroup, l
bind = $mainMod ALT, J, moveintogroup,  l
bind = $mainMod ALT, K, moveintogroup,  r

# ─── Keybinds: workspaces & monitors ───────────────────────────────────
# Special workspace (scratchpad)
bind = $mainMod SHIFT, S, movetoworkspacesilent, special

# Previous workspace toggle
bind = $mainMod, TAB, workspace, previous

# Swap workspaces between monitors
bind = $mainMod, Z, swapactiveworkspaces, DP-3 eDP-1
bind = $mainMod, Z, swapactiveworkspaces, DP-3 eDP-2
bind = $mainMod SHIFT, Z, exec, hyprctl dispatch movecurrentworkspacetomonitor DP-3

# Move workspace to monitor by direction
bind = ALT CTRL, h, movecurrentworkspacetomonitor, l
bind = ALT CTRL, l, movecurrentworkspacetomonitor, r
bind = ALT CTRL, k, movecurrentworkspacetomonitor, u
bind = ALT CTRL, j, movecurrentworkspacetomonitor, d

# ─── Keybinds: notifications ───────────────────────────────────────────
bind = $mainMod, N, exec, swaync-client -t

# ─── Keybinds: android dev ─────────────────────────────────────────────
bind = $mainMod ALT, N, exec, mirror

# ─── Battery / VPN / GPU (custom_scripts — HyDE) ───────────────────────
# bind = $mainMod ALT, B, exec, ~/.config/hypr/custom_scripts/toggle_battery_save.sh
# bind = $mainMod ALT, M, exec, ~/.config/waybar/scripts/asus_gpu_menu.sh
# bind = $mainMod ALT, V, exec, ~/.config/hypr/custom_scripts/toggle_vpn.sh

# ─── Keyboard backlight (custom_scripts) ───────────────────────────────
# bind = , xf86KbdBrightnessUp,   exec, ~/.config/hypr/custom_scripts/waybar/kb-brightness --inc
# bind = , xf86KbdBrightnessDown, exec, ~/.config/hypr/custom_scripts/waybar/kb-brightness --dec

# ─── Multimedia (FN keys) ──────────────────────────────────────────────
bind = , XF86Explorer, exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86Mail,     exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86Search,   exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
# bind = , xf86Rfkill,   exec, ~/.config/hypr/scripts/airplane_mode.sh

# ─── ASUS hardware ─────────────────────────────────────────────────────
bind = , XF86Launch1, exec, rog-control-center
bind = , XF86Launch3, exec, asusctl led-mode -n; notify-send -h string:x-canonical-private-synchronous:sys-notify -u low "Rog Aura changed"
# bind = , XF86Launch4, exec, ~/.config/hypr/custom_scripts/change_asus_profile.sh

# ─── Lid / monitor hotplug ─────────────────────────────────────────────
bindl = , switch:on:Lid Switch, exec, systemctl suspend

# Disable eDP-1 when DP-3 connected; restore on disconnect
bindl = , switch:on:DP-3,  exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:DP-3, exec, hyprctl keyword monitor "eDP-1, 2560x1600@120, 0x0, 1.33"
